server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/iqra_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: root123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.iqra.model.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

milvus:
  host: localhost
  port: 19530
  collectionName: internal_kb_collection
  dimension: 768

file:
  upload-path: ./uploads
  allowed-extensions: pdf,doc,docx,txt
  max-file-size: 52428800

langchain4j:
  models:
    qwen2-7b:
      base-url: http://localhost:11434
      model-name: qwen2:7b
      timeout: 60000
      temperature: 0.7
      max-tokens: 4096
    llama3-8b:
      base-url: http://localhost:11435
      model-name: llama3:8b
      timeout: 60000
      temperature: 0.7
      max-tokens: 4096
    chatglm3-6b:
      base-url: http://localhost:11436
      model-name: chatglm3:6b
      timeout: 60000
      temperature: 0.7
      max-tokens: 4096
  embedding:
    base-url: http://localhost:11437
    model-name: bge-small-zh-v1.5
  reranker:
    base-url: http://localhost:11438
    model-name: bge-reranker-base

logging:
  level:
    com.iqra: debug
